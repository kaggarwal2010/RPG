name: Unzip Assets
on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip pack
        run: |
          unzip -o '*.zip'
          rm -f *.zip
          
      - name: Commit extracted files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto-extract asset pack
          file_pattern: 'Tiles/ Characters/ Objects/ *.png'